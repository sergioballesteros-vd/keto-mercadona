name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/keto-mercadona}"
            cd "$DEPLOY_PATH"
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/sergioballesteros-vd/ketohoy.git
            fi
            git remote set-url origin https://github.com/sergioballesteros-vd/ketohoy.git
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            printf 'UNSPLASH_ACCESS_KEY=%s\n' "${{ secrets.UNSPLASH_ACCESS_KEY }}" > .env.local
            npm ci --omit=dev
            npx prisma migrate deploy
            npm run build
            pm2 restart ${{ secrets.PM2_APP_NAME }} --update-env
