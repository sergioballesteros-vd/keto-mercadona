name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/keto-mercadona}"
            TMP_DIR="$(mktemp -d)"
            git clone --depth 1 --branch main https://github.com/sergioballesteros-vd/ketohoy.git "$TMP_DIR"
            rsync -a --delete \
              --exclude '.env' \
              --exclude '.env.local' \
              --exclude 'dev.db' \
              "$TMP_DIR"/ "$DEPLOY_PATH"/
            cd "$DEPLOY_PATH"
            printf 'UNSPLASH_ACCESS_KEY=%s\n' "${{ secrets.UNSPLASH_ACCESS_KEY }}" > .env.local
            npm ci
            npx prisma db push
            npm run build
            pm2 restart ${{ secrets.PM2_APP_NAME }} --update-env
            rm -rf "$TMP_DIR"
